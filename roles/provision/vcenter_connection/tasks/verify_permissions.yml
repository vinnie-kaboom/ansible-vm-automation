---
# Uses ansible.builtin.uri (Python urllib stdlib) - no aiohttp or pyvmomi needed.

- name: "Authenticate to vCenter REST API"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/session"
    method: POST
    user: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    force_basic_auth: true
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 201
  register: vcenter_session
  delegate_to: localhost
  no_log: true
  tags: [vcenter, permissions]

- name: "Check vCenter API version"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/system/version"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: vcenter_info
  delegate_to: localhost
  tags: [vcenter, permissions, api_version]

- name: "Validate vCenter API version"
  assert:
    that:
      - vcenter_info.json.version is defined
      - vcenter_info.json.version is version('6.7', '>=')
    fail_msg: "vCenter version {{ vcenter_info.json.version }} is below minimum required 6.7"
    success_msg: "vCenter version {{ vcenter_info.json.version }} meets minimum requirements"
  when: vcenter_validation_check_api_version | default(true) | bool
  tags: [vcenter, permissions, api_version]

- name: "List all datacenters"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/datacenter"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_datacenters
  delegate_to: localhost
  when: vcenter_validation_check_datacenter_access | default(true) | bool
  tags: [vcenter, permissions, datacenter]

- name: "Check datacenter access"
  ansible.builtin.set_fact:
    datacenter_access:
      json: "{{ all_datacenters.json | default([]) | selectattr('name', 'equalto', config_vcenter_datacenter | default('')) | list }}"
  when: vcenter_validation_check_datacenter_access | default(true) | bool
  tags: [vcenter, permissions, datacenter]

- name: "Validate datacenter access"
  assert:
    that:
      - datacenter_access.json | default([]) | length > 0
    fail_msg: "Datacenter '{{ config_vcenter_datacenter }}' not found or not accessible."
    success_msg: "Datacenter access verified successfully"
  when:
    - vcenter_validation_check_datacenter_access | default(true) | bool
    - datacenter_access is not skipped
  tags: [vcenter, permissions, datacenter]

- name: "List all clusters"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/cluster"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_clusters
  delegate_to: localhost
  when: vcenter_validation_check_cluster_access | default(true) | bool
  tags: [vcenter, permissions, cluster]

- name: "Check cluster access"
  ansible.builtin.set_fact:
    cluster_access:
      json: "{{ all_clusters.json | default([]) | selectattr('name', 'equalto', config_vcenter_cluster) | list }}"
  when: vcenter_validation_check_cluster_access | default(true) | bool
  tags: [vcenter, permissions, cluster]

- name: "Validate cluster access"
  assert:
    that:
      - cluster_access.json | default([]) | length > 0
    fail_msg: "Cluster '{{ config_vcenter_cluster }}' not found or not accessible."
    success_msg: "Cluster access verified successfully"
  when:
    - vcenter_validation_check_cluster_access | default(true) | bool
    - cluster_access is not skipped
  tags: [vcenter, permissions, cluster]

- name: "List all datastores"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/datastore"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_datastores
  delegate_to: localhost
  when: config_vcenter_datastore | default('') != ''
  tags: [vcenter, permissions, datastore]

- name: "Check datastore access"
  ansible.builtin.set_fact:
    datastore_access:
      json: "{{ all_datastores.json | default([]) | selectattr('name', 'equalto', config_vcenter_datastore | default('')) | list }}"
  when: config_vcenter_datastore | default('') != ''
  tags: [vcenter, permissions, datastore]

- name: "Validate datastore access"
  assert:
    that:
      - datastore_access.json | default([]) | length > 0
    fail_msg: "Datastore '{{ config_vcenter_datastore }}' not found or not accessible."
    success_msg: "Datastore access verified successfully"
  when:
    - config_vcenter_datastore | default('') != ''
    - datastore_access is not skipped
  tags: [vcenter, permissions, datastore]
