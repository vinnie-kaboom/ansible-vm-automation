---
# All checks use vmware.vmware_rest modules

- name: "Check vCenter datacenter access"
  vmware.vmware_rest.vcenter_datacenter_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs | default(false) }}"
  delegate_to: localhost
  register: datacenter_access
  tags:
    - vcenter
    - permissions

- name: "Validate datacenter access"
  ansible.builtin.assert:
    that:
      - datacenter_access is succeeded
      - datacenter_access.value | default([]) | length > 0
    fail_msg: "Cannot access any datacenters in vCenter. Check credentials and permissions."
    success_msg: "Datacenter access verified ({{ datacenter_access.value | length }} datacenter(s) found)"
  tags:
    - vcenter
    - permissions

- name: "Check cluster access"
  vmware.vmware_rest.vcenter_cluster_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs | default(false) }}"
    filter_names:
      - "{{ config_vcenter_cluster }}"
  delegate_to: localhost
  register: cluster_access
  ignore_errors: false
  when: config_vcenter_cluster | default('') | length > 0
  tags:
    - vcenter
    - permissions

- name: "Validate cluster access"
  ansible.builtin.assert:
    that:
      - cluster_access is succeeded
      - cluster_access.value | default([]) | length > 0
    fail_msg: "Cluster '{{ config_vcenter_cluster }}' not found or not accessible."
    success_msg: "Cluster '{{ config_vcenter_cluster }}' access verified"
  when: config_vcenter_cluster | default('') | length > 0
  tags:
    - vcenter
    - permissions

- name: "Check datastore access"
  vmware.vmware_rest.vcenter_datastore_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs | default(false) }}"
    filter_names:
      - "{{ config_vcenter_datastore }}"
  delegate_to: localhost
  register: datastore_access
  ignore_errors: false
  when: config_vcenter_datastore | default('') | length > 0
  tags:
    - vcenter
    - permissions

- name: "Validate datastore access"
  ansible.builtin.assert:
    that:
      - datastore_access is succeeded
      - datastore_access.value | default([]) | length > 0
    fail_msg: "Datastore '{{ config_vcenter_datastore }}' not found or not accessible."
    success_msg: "Datastore '{{ config_vcenter_datastore }}' access verified"
  when: config_vcenter_datastore | default('') | length > 0
  tags:
    - vcenter
    - permissions

- name: "Check network access"
  vmware.vmware_rest.vcenter_network_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs | default(false) }}"
  delegate_to: localhost
  register: network_access
  ignore_errors: true
  tags:
    - vcenter
    - permissions

- name: "Display vCenter connectivity summary"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "vCenter Connectivity Summary"
      - "========================================="
      - "Host: {{ vcenter_host }}"
      - "Datacenters: {{ datacenter_access.value | map(attribute='name') | list }}"
      - "Cluster: {{ config_vcenter_cluster | default('N/A') }}"
      - "Datastore: {{ config_vcenter_datastore | default('N/A') }}"
      - "Networks: {{ network_access.value | default([]) | length }} found"
      - "========================================="
  tags:
    - vcenter
    - permissions
