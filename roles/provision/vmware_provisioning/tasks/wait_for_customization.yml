---
# Wait for VMware Tools and guest customization using vmware.vmware_rest
# _vm_moid must be set before including this file

# Wait for VMware Tools to report running
- name: "Wait for VMware Tools to become available"
  vmware.vmware_rest.vcenter_vm_tools_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    vm: "{{ _vm_moid }}"
  register: vmtools_wait
  until:
    - vmtools_wait is not failed
    - vmtools_wait.value.run_state is defined
    - vmtools_wait.value.run_state == "RUNNING"
  retries: "{{ config_vm_max_retries | default(60) | int }}"
  delay: "{{ config_vm_retry_delay | default(30) | int }}"
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

# Wait for VM to be powered on and tools running
- name: "Wait for guest OS to be ready"
  vmware.vmware_rest.vcenter_vm_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    vm: "{{ _vm_moid }}"
  register: vm_info
  until:
    - vm_info is not failed
    - vm_info.value.power_state is defined
    - vm_info.value.power_state == "POWERED_ON"
  retries: "{{ config_vm_wait_for_guest_state_retries | int }}"
  delay: "{{ config_vm_wait_for_guest_state_delay | int }}"
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

# Wait for VM to get its IP via guest networking info
- name: "Wait for VM to obtain IP address"
  vmware.vmware_rest.vcenter_vm_guest_networking_interfaces_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    vm: "{{ _vm_moid }}"
  register: vm_net_info
  until:
    - vm_net_info is not failed
    - vm_net_info.value is defined
    - vm_net_info.value | length > 0
    - vm_net_info.value[0].ip is defined
    - vm_net_info.value[0].ip.ip_addresses is defined
    - vm_net_info.value[0].ip.ip_addresses | selectattr('ip_address', 'equalto', config_vm_network_start_ip) | list | length > 0
  retries: 20
  delay: 15
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

- name: "Post-customization wait for network stack to stabilize"
  ansible.builtin.pause:
    seconds: "{{ config_vm_post_boot_wait | default(30) | int }}"
  when: not ansible_check_mode

# Extract the current IP for downstream tasks
- name: "Extract VM IP from network info"
  ansible.builtin.set_fact:
    _vm_current_ip: >-
      {{ vm_net_info.value[0].ip.ip_addresses
         | selectattr('ip_address', 'defined')
         | selectattr('prefix_length', 'defined')
         | rejectattr('ip_address', 'match', '^fe80')
         | map(attribute='ip_address')
         | first
         | default('') }}
  when:
    - not ansible_check_mode
    - vm_net_info is defined
    - vm_net_info.value is defined
    - vm_net_info.value | length > 0
    - vm_net_info.value[0].ip is defined

# Retrieve customization log file from VM via SSH if IP doesn't match
- name: "Retrieve customization log file from VM via SSH"
  ansible.builtin.fetch:
    src: "/var/log/vmware-imc/toolsDeployPkg.log"
    dest: "/tmp/{{ config_vm_name }}_toolsDeployPkg.log"
    flat: yes
  vars:
    ansible_user: "{{ secrets.ANSIBLE_USER | default('root') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  register: log_fetch
  ignore_errors: true
  when:
    - not ansible_check_mode
    - _vm_current_ip | default('') | length > 0
    - _vm_current_ip != config_vm_network_start_ip

- name: "Display customization log contents"
  ansible.builtin.command:
    cmd: "cat /tmp/{{ config_vm_name }}_toolsDeployPkg.log"
  register: log_contents
  delegate_to: localhost
  ignore_errors: true
  changed_when: false
  when:
    - not ansible_check_mode
    - log_fetch is defined
    - log_fetch is succeeded

- name: "Show customization error details"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "CUSTOMIZATION ISSUE FOR {{ config_vm_name }}"
      - "========================================="
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "Actual IP: {{ _vm_current_ip | default('No IP assigned') }}"
      - ""
      - "Log file contents:"
      - "{{ log_contents.stdout_lines | default(['Could not retrieve log file']) }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - log_contents is defined
    - log_contents is succeeded

# Display VM network status
- name: "Display VM network information"
  ansible.builtin.debug:
    msg:
      - "VM Name: {{ config_vm_name }}"
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "VM IP from Tools: {{ _vm_current_ip | default('Not yet assigned') }}"
      - "VMware Tools: {{ vmtools_wait.value.run_state | default('Unknown') }}"
      - "Power State: {{ vm_info.value.power_state | default('Unknown') }}"
  when: not ansible_check_mode

- name: "Check if VM has correct IP address"
  ansible.builtin.set_fact:
    vm_has_correct_ip: "{{ _vm_current_ip | default('') == config_vm_network_start_ip }}"
    vm_has_any_ip: "{{ _vm_current_ip | default('') | length > 0 }}"
  when: not ansible_check_mode

- name: "Display IP check result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Network Configuration Status"
      - "========================================="
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "Actual IP: {{ _vm_current_ip | default('No IP assigned') }}"
      - "Network: {{ config_vm_network }}"
      - "Gateway: {{ config_vm_network_gateway }}"
      - "Netmask: {{ config_vm_network_netmask }}"
      - "DNS: {{ config_vm_network_dns_servers }}"
      - "Status: {{ 'CORRECT' if vm_has_correct_ip | default(false) else ('WRONG IP' if vm_has_any_ip | default(false) else 'NO IP - Network customization failed') }}"
      - "Action: {{ 'Continue' if vm_has_correct_ip | default(false) else 'Will configure network via SSH' }}"
      - "========================================="
  when: not ansible_check_mode
