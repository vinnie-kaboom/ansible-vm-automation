---
# Wait for VMware Tools and guest customization using vmware.vmware collection
# vmware_guest_tools_wait has no equivalent — poll guest_info instead

- name: "Wait for VMware Tools to become available (polling)"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
  register: vmtools_wait
  until: >
    vmtools_wait.guests is defined and
    vmtools_wait.guests | length > 0 and
    vmtools_wait.guests[0].guest_tools_status is defined and
    vmtools_wait.guests[0].guest_tools_status == "guestToolsRunning"
  retries: "{{ config_vm_max_retries | default(60) | int }}"
  delay: "{{ config_vm_retry_delay | default(30) | int }}"
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

- name: "Wait for guest OS customization to complete"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
  register: vm_info
  until: >
    vm_info.guests is defined and
    vm_info.guests | length > 0 and
    vm_info.guests[0].hw_power_status is defined and
    vm_info.guests[0].hw_power_status == "poweredOn" and
    vm_info.guests[0].guest_tools_status is defined and
    vm_info.guests[0].guest_tools_status == "guestToolsRunning"
  retries: "{{ config_vm_wait_for_guest_state_retries | int }}"
  delay: "{{ config_vm_wait_for_guest_state_delay | int }}"
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

- name: "Wait for VM to obtain correct IP address"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
  register: vm_info
  until: >
    vm_info.guests is defined and
    vm_info.guests | length > 0 and
    vm_info.guests[0].ipv4 is defined and
    vm_info.guests[0].ipv4 is not none and
    vm_info.guests[0].ipv4 == config_vm_network_start_ip
  retries: 20
  delay: 15
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
  failed_when: false

- name: "Post-customization wait for network stack to stabilize"
  ansible.builtin.pause:
    seconds: "{{ config_vm_post_boot_wait | default(30) | int }}"
  when: not ansible_check_mode

# Set convenience facts from the guest_info list response
- name: "Extract VM info from guest list"
  ansible.builtin.set_fact:
    _vm_guest: "{{ vm_info.guests[0] | default({}) }}"
  when:
    - not ansible_check_mode
    - vm_info.guests is defined
    - vm_info.guests | length > 0

- name: "Retrieve customization log file from VM via SSH"
  ansible.builtin.fetch:
    src: "/var/log/vmware-imc/toolsDeployPkg.log"
    dest: "/tmp/{{ config_vm_name }}_toolsDeployPkg.log"
    flat: yes
  vars:
    ansible_user: "{{ secrets.ANSIBLE_USER | default('root') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  register: log_fetch
  ignore_errors: true
  when:
    - not ansible_check_mode
    - _vm_guest.ipv4 is defined
    - _vm_guest.ipv4 is not none
    - _vm_guest.ipv4 != config_vm_network_start_ip

- name: "Display customization log contents"
  ansible.builtin.command:
    cmd: "cat /tmp/{{ config_vm_name }}_toolsDeployPkg.log"
  register: log_contents
  delegate_to: localhost
  ignore_errors: true
  changed_when: false
  when:
    - not ansible_check_mode
    - log_fetch is defined
    - log_fetch is succeeded

- name: "Show customization error details"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "CUSTOMIZATION ISSUE FOR {{ config_vm_name }}"
      - "========================================="
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "Actual IP: {{ _vm_guest.ipv4 | default('No IP assigned') }}"
      - ""
      - "Log file contents from /var/log/vmware-imc/toolsDeployPkg.log:"
      - "{{ log_contents.stdout_lines | default(['Could not retrieve log file']) }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - log_contents is defined
    - log_contents is succeeded

- name: "Get detailed VM network information"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    schema: vsphere
  register: vm_detailed_info
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local

- name: "Display VM network information from VMware Tools"
  ansible.builtin.debug:
    msg:
      - "VM Name: {{ config_vm_name }}"
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "VM IP from Tools: {{ _vm_guest.ipv4 | default('Not yet assigned') }}"
      - "Guest Tools Status: {{ _vm_guest.guest_tools_status | default('Unknown') }}"
      - "Power Status: {{ _vm_guest.hw_power_status | default('Unknown') }}"
  when: not ansible_check_mode

- name: "Check if VM has correct IP address"
  ansible.builtin.set_fact:
    vm_has_correct_ip: "{{ (_vm_guest.ipv4 is defined) and (_vm_guest.ipv4 is not none) and (_vm_guest.ipv4 == config_vm_network_start_ip) }}"
    vm_has_any_ip: "{{ (_vm_guest.ipv4 is defined) and (_vm_guest.ipv4 is not none) and (_vm_guest.ipv4 | string | length > 0) }}"
  when: not ansible_check_mode

- name: "Display IP check result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Network Configuration Status"
      - "========================================="
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "Actual IP: {{ _vm_guest.ipv4 | default('No IP assigned') }}"
      - "Network: {{ config_vm_network }}"
      - "Gateway: {{ config_vm_network_gateway }}"
      - "Netmask: {{ config_vm_network_netmask }}"
      - "DNS: {{ config_vm_network_dns_servers }}"
      - "Status: {{ 'CORRECT' if vm_has_correct_ip | default(false) else ('WRONG IP' if vm_has_any_ip | default(false) else 'NO IP - Network customization failed') }}"
      - "Action: {{ 'Continue' if vm_has_correct_ip | default(false) else 'Will configure network via SSH' }}"
      - "========================================="
  when: not ansible_check_mode
