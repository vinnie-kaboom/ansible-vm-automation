---
# Uses ansible.builtin.uri (Python urllib stdlib) - no aiohttp or pyvmomi needed.
# Session token passed in from create_vm.yml via vcenter_session variable.

# Poll VM power state directly by MOID — avoids fetching all VMs on every retry.
- name: "Wait for VM to be powered on"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ new_vm_id }}/power"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
    timeout: 30
  register: vm_power_check
  until: vm_power_check.json.state is defined and vm_power_check.json.state == "POWERED_ON"
  retries: "{{ config_vm_wait_for_guest_state_retries | int }}"
  delay: "{{ config_vm_wait_for_guest_state_delay | int }}"
  when:
    - not ansible_check_mode
    - new_vm_id is defined
  delegate_to: localhost
  failed_when: false

# /api/vcenter/vm/{id}/guest/identity returns a flat { "ip_address": "x.x.x.x", ... }
# once VMware Tools reports the guest IP after customization completes and reboots.
- name: "Wait for VM to obtain correct IP address"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ new_vm_id }}/guest/identity"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
    timeout: 30
  register: vm_identity_info
  until: >
    vm_identity_info.json is defined and
    vm_identity_info.json.ip_address is defined and
    vm_identity_info.json.ip_address == config_vm_network_start_ip
  retries: 30
  delay: 20
  when:
    - not ansible_check_mode
    - new_vm_id is defined
  delegate_to: localhost
  failed_when: false

- name: "Post-customization wait for network stack to stabilize"
  ansible.builtin.pause:
    seconds: "{{ config_vm_post_boot_wait | default(30) | int }}"
  when: not ansible_check_mode

- name: "Set IP check facts"
  ansible.builtin.set_fact:
    vm_has_correct_ip: "{{ vm_identity_info.json.ip_address | default('') == config_vm_network_start_ip }}"
    vm_has_any_ip: "{{ vm_identity_info.json.ip_address | default('') | length > 0 }}"
    vm_reported_ips: "{{ [vm_identity_info.json.ip_address] if vm_identity_info.json.ip_address is defined else [] }}"
  when:
    - not ansible_check_mode
    - vm_identity_info is defined

- name: "Display IP check result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Network Configuration Status"
      - "========================================="
      - "Expected IP: {{ config_vm_network_start_ip }}"
      - "Reported IP: {{ vm_identity_info.json.ip_address | default('No IP assigned') }}"
      - "Network: {{ config_vm_network }}"
      - "Gateway: {{ config_vm_network_gateway }}"
      - "Netmask: {{ config_vm_network_netmask }}"
      - "DNS: {{ config_vm_network_dns_servers }}"
      - "Status: {{ 'CORRECT' if vm_has_correct_ip | default(false) else ('WRONG IP' if vm_has_any_ip | default(false) else 'NO IP') }}"
      - "========================================="
  when: not ansible_check_mode
