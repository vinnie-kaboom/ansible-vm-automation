---
# Network Validation Tasks
# Tests network connectivity and validates IP configuration

# vmware_vm_shell has no equivalent in vmware.vmware - run diagnostics via SSH instead.
- name: "Get VM network details via SSH (for diagnostics)"
  ansible.builtin.shell: |
    echo "=== Network Interfaces ==="
    ip addr show
    echo "=== Routes ==="
    ip route show
    echo "=== DNS ==="
    cat /etc/resolv.conf 2>/dev/null || echo "No resolv.conf"
    echo "=== Ping Gateway ==="
    ping -c 2 {{ config_vm_network_gateway }} 2>&1 || echo "Cannot ping gateway"
  delegate_to: "{{ config_vm_network_start_ip }}"
  remote_user: "{{ config_vm_root_user | default('root') }}"
  when:
    - not ansible_check_mode
    - config_vm_root_password is defined
    - config_vm_root_password | length > 0
  ignore_errors: true
  register: vm_network_diagnostics

- name: "Display VM internal network diagnostics"
  ansible.builtin.debug:
    msg: "{{ vm_network_diagnostics.stdout_lines | default(['Diagnostics failed - check VM credentials']) }}"
  when:
    - not ansible_check_mode
    - vm_network_diagnostics is defined

- name: "Set ip_check for compatibility"
  ansible.builtin.set_fact:
    ip_check:
      failed: "{{ not (vm_has_correct_ip | default(false)) }}"
      succeeded: "{{ vm_has_correct_ip | default(false) }}"
  when: not ansible_check_mode

- name: "Test network connectivity to VM (TCP port 22)"
  ansible.builtin.wait_for:
    host: "{{ config_vm_network_start_ip }}"
    port: 22
    timeout: 10
    state: started
  when: not ansible_check_mode
  delegate_to: localhost
  ignore_errors: true
  register: ping_result

- name: "Set VM pingable status"
  ansible.builtin.set_fact:
    vm_is_pingable: "{{ ping_result.failed is defined and not ping_result.failed }}"
    vm_provisioning_issues: "{{ vm_provisioning_issues | default([]) + (['Network connectivity failed - VM not reachable on port 22'] if (ping_result.failed | default(true)) else []) }}"
  when: not ansible_check_mode

- name: "Display ping result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Network Connectivity Test"
      - "========================================="
      - "Target: {{ config_vm_network_start_ip }}"
      - "Result: {{ '✅ SUCCESS - VM is reachable on port 22' if vm_is_pingable else '❌ FAILED - VM is NOT reachable on port 22' }}"
      - "{{ 'SSH check will proceed' if vm_is_pingable else 'SSH check will be SKIPPED (no network connectivity)' }}"
      - "========================================="
  when: not ansible_check_mode
