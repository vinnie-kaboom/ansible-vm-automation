---
# SSH Validation Tasks
# Checks port 22 reachability and reports SSH status.

- name: "Wait for SSH port to become available"
  ansible.builtin.wait_for:
    host: "{{ config_vm_network_start_ip }}"
    port: 22
    state: started
    timeout: 300
    delay: 10
  when: not ansible_check_mode
  delegate_to: localhost
  register: ssh_wait_result
  failed_when: false

- name: "Set SSH reachability status"
  ansible.builtin.set_fact:
    vm_port22_reachable: "{{ not (ssh_wait_result.failed | default(true)) }}"
    ssh_port_available: "{{ not (ssh_wait_result.failed | default(true)) }}"
    vm_provisioning_issues: >-
      {{
        vm_provisioning_issues | default([]) +
        (['SSH port 22 not reachable'] if (ssh_wait_result.failed | default(true)) else [])
      }}
  when: not ansible_check_mode

- name: "Final SSH status summary"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "SSH Connectivity Status for {{ config_vm_name }}"
      - "========================================="
      - "VM IP: {{ config_vm_network_start_ip }}"
      - "SSH Port Open: {{ 'YES ✅' if vm_port22_reachable | default(false) else 'NO ❌' }}"
      - "========================================="
      - "Final Status: {{ 'SSH IS READY ✓' if vm_port22_reachable | default(false) else 'SSH NOT AVAILABLE ✗' }}"
      - "========================================="
  when: not ansible_check_mode

- name: "Warn if SSH is not available"
  ansible.builtin.debug:
    msg: |
      ⚠️  WARNING: SSH port 22 not reachable on {{ config_vm_name }} ({{ config_vm_network_start_ip }})

      Troubleshooting:
      1. Check VM is on correct network: {{ config_vm_network }}
      2. Check SSH service: systemctl status sshd
      3. Check firewall: firewall-cmd --list-all
  when:
    - not ansible_check_mode
    - not (vm_port22_reachable | default(false))
