---
# Creates VM from template using vCenter REST API via ansible.builtin.uri.
# ansible.builtin.uri uses Python urllib (stdlib) - no aiohttp or pyvmomi needed.

- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Authenticate to vCenter REST API - token used for all subsequent calls.
- name: "Authenticate to vCenter REST API"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/session"
    method: POST
    user: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    force_basic_auth: true
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 201
  register: vcenter_session
  delegate_to: localhost
  when: not ansible_check_mode
  no_log: true

- name: "List all VMs"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_vms
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Check if VM already exists"
  ansible.builtin.set_fact:
    existing_vm_check:
      json: "{{ all_vms.json | default([]) | selectattr('name', 'equalto', config_vm_name) | list }}"
  when: not ansible_check_mode

- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ (existing_vm_check.json | default([]) | length) > 0 }}"
      - "Power State: {{ existing_vm_check.json[0].power_state | default('N/A') }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# Look up MOIDs needed for the clone placement spec.
- name: "Look up template MOID"
  ansible.builtin.set_fact:
    template_info:
      json: "{{ all_vms.json | default([]) | selectattr('name', 'equalto', config_vm_template) | list }}"
  when: not ansible_check_mode

- name: "Fail if template not found"
  ansible.builtin.fail:
    msg: "Template '{{ config_vm_template }}' not found in vCenter."
  when:
    - not ansible_check_mode
    - template_info.json | default([]) | length == 0

- name: "List all datastores"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/datastore"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_datastores
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Look up datastore MOID"
  ansible.builtin.set_fact:
    datastore_info:
      json: "{{ all_datastores.json | default([]) | selectattr('name', 'equalto', config_vcenter_datastore) | list }}"
  when: not ansible_check_mode

- name: "List all clusters"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/cluster"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_clusters
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "Look up cluster MOID"
  ansible.builtin.set_fact:
    cluster_info:
      json: "{{ all_clusters.json | default([]) | selectattr('name', 'equalto', config_vcenter_cluster) | list }}"
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "List all VM folders"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/folder?filter.type=VIRTUAL_MACHINE"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_folders
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Look up VM folder MOID"
  ansible.builtin.set_fact:
    folder_info:
      json: "{{ all_folders.json | default([]) | selectattr('name', 'equalto', config_vm_folder) | list }}"
  when: not ansible_check_mode

# Clone from template using cluster placement.
- name: "Clone VM from template (cluster)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?action=clone"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      source: "{{ template_info.json[0].vm }}"
      placement:
        cluster: "{{ cluster_info.json[0].cluster }}"
        datastore: "{{ datastore_info.json[0].datastore }}"
        folder: "{{ folder_info.json[0].folder }}"
      power_on: false
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''
    - existing_vm_check.json | default([]) | length == 0

# Clone from template using resource pool placement.
- name: "Clone VM from template (resource pool)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?action=clone"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      source: "{{ template_info.json[0].vm }}"
      placement:
        resource_pool: "{{ config_vcenter_resource_pool }}"
        datastore: "{{ datastore_info.json[0].datastore }}"
        folder: "{{ folder_info.json[0].folder }}"
      power_on: false
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') != ''
    - existing_vm_check.json | default([]) | length == 0

# Apply Linux OS customization before first power-on.
- name: "Apply Linux guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        linux_config:
          hostname:
            type: FIXED
            fixed_name: "{{ config_vm_name.split('.')[0] }}"
          domain: "{{ config_vm_domain }}"
          time_zone: "America/New_York"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined
    - config_vm_os is defined
    - "'Linux' in config_vm_os or 'RHEL' in config_vm_os"

# Apply Windows sysprep customization before first power-on.
- name: "Apply Windows guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        windows_config:
          reboot: REBOOT
          sysprep:
            user_data:
              computer_name:
                type: FIXED
                fixed_name: "{{ config_vm_name.split('.')[0] }}"
              full_name: "{{ config_windows_fullname | default('Administrator') }}"
              org_name: "{{ config_windows_orgname | default('Organization') }}"
              product_key: ""
            gui_unattended:
              auto_logon: "{{ config_windows_autologon | default(false) }}"
              auto_logon_count: "{{ config_windows_autologon_count | default(1) }}"
              password: "{{ config_windows_admin_password | default(config_vm_root_password) }}"
              time_zone: "{{ config_windows_timezone | default(35) }}"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined
    - config_vm_os is defined
    - "'Windows' in config_vm_os"

- name: "Power on VM (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would power on {{ config_vm_name }}"
  when: ansible_check_mode

- name: "Power on VM"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/power?action=start"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined

- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "VM MOID: {{ vm_creation.json | default('N/A') }}"
      - "Status: {{ 'SUCCESS' if (vm_creation is defined and not vm_creation.failed | default(false)) else 'FAILED' }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - vm_creation is defined

- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: "VM creation failed for {{ config_vm_name }}. Check vCenter tasks for details."
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.failed | default(false)
