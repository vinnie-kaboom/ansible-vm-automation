---
# Creates VM from template using vCenter REST API via ansible.builtin.uri.
# Uses only Python stdlib urllib — no pyvmomi or aiohttp required.

- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Authenticate to vCenter REST API
- name: "Authenticate to vCenter REST API"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/session"
    method: POST
    user: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    force_basic_auth: true
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 201
  register: vcenter_session
  delegate_to: localhost
  when: not ansible_check_mode
  no_log: true

# List all VMs and templates
- name: "List all VMs and templates"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: all_vms
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Check if VM already exists"
  ansible.builtin.set_fact:
    existing_vm_check:
      json: "{{ all_vms.json | default([]) | selectattr('name', 'equalto', config_vm_name) | list }}"
  when: not ansible_check_mode

# Display existing VM status
- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ (existing_vm_check.json | default([]) | length) > 0 }}"
      - "Power State: {{ existing_vm_check.json[0].power_state | default('N/A') }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# If VM already exists, reuse its MOID
- name: "Set VM MOID from existing VM"
  ansible.builtin.set_fact:
    new_vm_id: "{{ existing_vm_check.json[0].vm }}"
  when:
    - not ansible_check_mode
    - existing_vm_check.json | length > 0

# List content libraries and items
- name: "List all content libraries"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: content_libraries
  delegate_to: localhost
  when: not ansible_check_mode

- name: "List items in each content library"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library/item?library_id={{ item }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: library_items_results
  loop: "{{ content_libraries.json | default([]) }}"
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Get details for each library item"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library/item/{{ item }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: library_item_details
  loop: >-
    {{
      library_items_results.results | default([])
      | selectattr('json', 'defined')
      | map(attribute='json') | flatten
    }}
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Find template in content library by name"
  ansible.builtin.set_fact:
    content_library_item_id: >-
      {{
        (library_item_details.results | default([])
        | selectattr('json', 'defined')
        | map(attribute='json')
        | selectattr('name', 'equalto', config_vm_template)
        | list | first).id | default('')
      }}
  when: not ansible_check_mode

- name: "Fail if template not found"
  ansible.builtin.fail:
    msg: "Template '{{ config_vm_template }}' not found in any Content Library."
  when:
    - not ansible_check_mode
    - content_library_item_id | default('') == ''

# Datastore lookup
- name: "List all datastores"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/datastore"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: all_datastores
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Look up datastore MOID"
  ansible.builtin.set_fact:
    datastore_info:
      json: "{{ all_datastores.json | default([]) | selectattr('name', 'equalto', config_vcenter_datastore) | list }}"
  when: not ansible_check_mode

# Cluster / resource pool lookup
- name: "List all clusters"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/cluster"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: all_clusters
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "Look up cluster MOID"
  ansible.builtin.set_fact:
    cluster_info:
      json: "{{ all_clusters.json | default([]) | selectattr('name', 'equalto', config_vcenter_cluster) | list }}"
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "List all resource pools"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/resource-pool"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: all_resource_pools
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "Look up root resource pool for cluster"
  ansible.builtin.set_fact:
    cluster_resource_pool_id: "{{ (all_resource_pools.json | selectattr('name','equalto','Resources') | list | first).resource_pool }}"
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

# Folder lookup
- name: "List all folders"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/folder"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 200
  register: all_folders
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Look up VM folder MOID"
  ansible.builtin.set_fact:
    folder_info:
      json: "{{ all_folders.json | default([]) | selectattr('name', 'equalto', config_vm_folder) | list }}"
  when: not ansible_check_mode

# Deploy OVF (only if VM doesn't already exist)
- name: "Deploy VM from OVF library item"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/ovf/library-item/{{ content_library_item_id }}?action=deploy"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    body_format: json
    body:
      deployment_spec:
        name: "{{ config_vm_name }}"
        accept_all_EULA: true
        default_datastore_id: "{{ datastore_info.json[0].datastore }}"
        storage_provisioning: thin
      target:
        resource_pool_id: "{{ cluster_resource_pool_id }}"
        folder_id: "{{ folder_info.json[0].folder }}"
    status_code:
      - 200
      - 201
    timeout: 600
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - existing_vm_check.json | default([]) | length == 0

# DEBUG deploy result
- name: "DEBUG: Show deploy result"
  ansible.builtin.debug:
    var: vm_creation
  when:
    - not ansible_check_mode
    - vm_creation is defined

# Extract VM MOID
- name: "Set VM MOID from deploy result"
  ansible.builtin.set_fact:
    new_vm_id: >-
      {{
        (
          (vm_creation.json.resource_id.id
           | default(vm_creation.json.vm_id))
          | default((vm_creation.content | from_json).resource_id.id
           | default((vm_creation.content | from_json).vm_id))
        )
      }}
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation is not skipped

# Apply Linux guest customization
- name: "Apply Linux guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ new_vm_id }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    body_format: json
    body:
      spec:
        configuration_spec:
          linux_config:
            hostname:
              type: FIXED
              fixed_name: "{{ config_vm_name.split('.')[0] }}"
            domain: "{{ config_vm_domain }}"
            time_zone: "America/New_York"
          global_DNS_settings:
            dns_suffix_list:
              - "{{ config_vm_domain }}"
            dns_servers: "{{ config_vm_network_dns_servers.split(',') }}"
          interfaces:
            - adapter:
                ipv4:
                  type: STATIC
                  ip_address: "{{ config_vm_network_start_ip }}"
                  prefix: >-
                    {{
                      config_vm_network_prefix | default(
                        {'255.255.255.0': 24, '255.255.255.128': 25,
                         '255.255.255.192': 26, '255.255.255.224': 27,
                         '255.255.255.240': 28, '255.255.254.0': 23,
                         '255.255.252.0': 22, '255.255.248.0': 21,
                         '255.255.240.0': 20, '255.255.0.0': 16,
                         '255.254.0.0': 15, '255.0.0.0': 8}[config_vm_network_netmask] | default(24)
                      )
                    }}
                  gateways:
                    - "{{ config_vm_network_gateway }}"
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - new_vm_id is defined
    - not (config_vm_os | default('Linux') is search('Windows'))

# Apply Windows guest customization
- name: "Apply Windows guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ new_vm_id }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    body_format: json
    body:
      spec:
        configuration_spec:
          windows_config:
            reboot: REBOOT
            sysprep:
              user_data:
                computer_name:
                  type: FIXED
                  fixed_name: "{{ config_vm_name.split('.')[0] }}"
                full_name: "{{ config_windows_fullname | default('Administrator') }}"
                organization: "{{ config_windows_orgname | default('Organization') }}"
                product_key: ""
              gui_unattended:
                auto_logon: "{{ config_windows_autologon | default(false) }}"
                auto_logon_count: "{{ config_windows_autologon_count | default(1) }}"
                password: "{{ config_windows_admin_password | default(config_vm_root_password) }}"
                time_zone: "{{ config_windows_timezone | default(35) }}"
          global_DNS_settings:
            dns_suffix_list:
              - "{{ config_vm_domain }}"
            dns_servers: "{{ config_vm_network_dns_servers.split(',') }}"
          interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - new_vm_id is defined
    - config_vm_os is defined
    - "'Windows' in config_vm_os"

# Power on VM
- name: "Power on VM"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ new_vm_id }}/power?action=start"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs | bool }}"
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - new_vm_id is defined

# Display result
- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "VM MOID: {{ new_vm_id | default('N/A') }}"
      - "Status: {{ 'SUCCESS' if (vm_creation is defined and not vm_creation.failed | default(false)) else 'FAILED' }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - new_vm_id is defined

- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: "VM creation failed for {{ config_vm_name }}. Check vCenter tasks for details."
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.failed | default(false)