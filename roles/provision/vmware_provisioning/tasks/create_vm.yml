---
# Creates VM from template using vmware.vmware collection (v2.3.0+).
# Customization applied via vCenter REST API (ansible.builtin.uri) - no aiohttp needed.
# pyvmomi is required for deploy_folder_template, guest_info, and vm_powerstate.

- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Check existence via guest_info - returns guests[] list, empty if VM not found.
- name: "Check if VM already exists"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
  register: existing_vm_check
  delegate_to: localhost
  ignore_errors: true
  when: not ansible_check_mode

- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ (existing_vm_check.guests | default([]) | length) > 0 }}"
      - "Power State: {{ existing_vm_check.guests[0].hw_power_status | default('N/A') }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# deploy_folder_template clones synchronously - no async polling needed.
# power_on_after_deploy: false so we can apply customization before first boot.
- name: "Clone VM from template"
  vmware.vmware.deploy_folder_template:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    vm_name: "{{ config_vm_name }}"
    template_name: "{{ config_vm_template }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    cluster: "{{ config_vcenter_cluster | default(omit) }}"
    resource_pool: "{{ config_vcenter_resource_pool | default(omit) }}"
    vm_folder: "{{ config_vm_folder }}"
    datastore: "{{ config_vcenter_datastore }}"
    power_on_after_deploy: false
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - existing_vm_check.guests | default([]) | length == 0

# Authenticate to vCenter REST API for customization calls.
# ansible.builtin.uri uses Python urllib (stdlib) - no aiohttp needed.
- name: "Authenticate to vCenter REST API"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/session"
    method: POST
    user: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    force_basic_auth: true
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 201
  register: vcenter_session
  delegate_to: localhost
  no_log: true
  when:
    - not ansible_check_mode
    - vm_creation is not skipped
    - not vm_creation.failed | default(false)

# Look up the VM's MOID so we can call the customization API.
- name: "Look up VM MOID"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?filter.names={{ config_vm_name | urlencode }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: vm_moid_lookup
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vcenter_session is defined
    - not vcenter_session.failed | default(false)

- name: "Set VM MOID fact"
  ansible.builtin.set_fact:
    vm_moid: "{{ vm_moid_lookup.json[0].vm }}"
  when:
    - not ansible_check_mode
    - vm_moid_lookup is defined
    - vm_moid_lookup.json | default([]) | length > 0

# Apply Linux OS customization (hostname, domain, DNS) before first power-on.
- name: "Apply Linux guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_moid }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        linux_config:
          hostname:
            type: FIXED
            fixed_name: "{{ config_vm_name.split('.')[0] }}"
          domain: "{{ config_vm_domain }}"
          time_zone: "America/New_York"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_moid is defined
    - config_vm_os is defined
    - "'Linux' in config_vm_os or 'RHEL' in config_vm_os"

# Apply Windows sysprep customization before first power-on.
- name: "Apply Windows guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_moid }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        windows_config:
          reboot: REBOOT
          sysprep:
            user_data:
              computer_name:
                type: FIXED
                fixed_name: "{{ config_vm_name.split('.')[0] }}"
              full_name: "{{ config_windows_fullname | default('Administrator') }}"
              org_name: "{{ config_windows_orgname | default('Organization') }}"
              product_key: ""
            gui_unattended:
              auto_logon: "{{ config_windows_autologon | default(false) }}"
              auto_logon_count: "{{ config_windows_autologon_count | default(1) }}"
              password: "{{ config_windows_admin_password | default(config_vm_root_password) }}"
              time_zone: "{{ config_windows_timezone | default(35) }}"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_moid is defined
    - config_vm_os is defined
    - "'Windows' in config_vm_os"

- name: "Power on VM (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would power on {{ config_vm_name }}"
  when: ansible_check_mode

- name: "Power on VM"
  vmware.vmware.vm_powerstate:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    state: powered-on
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation is not skipped
    - not vm_creation.failed | default(false)

- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "Status: {{ 'SUCCESS' if (vm_creation is defined and not vm_creation.failed | default(false)) else 'FAILED' }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - vm_creation is defined

- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: |
      VM creation failed for {{ config_vm_name }}.

      Possible causes:
      1. Template '{{ config_vm_template }}' not found in folder '{{ config_vm_folder }}'
      2. Datastore '{{ config_vcenter_datastore }}' has insufficient space
      3. Cluster or resource pool not accessible
      4. VM already exists with conflicting configuration

      Check vCenter tasks for VM {{ config_vm_name }} to see actual status.
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.failed | default(false)
