---
# Creates VM from template using vmware.vmware collection
# Split into: deploy_folder_template (clone) + vm (configure) + vm_apply_customization (OS config)

# Dry-run simulation for check mode
- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Query vCenter for VM existence and current state
- name: "Check if VM already exists"
  vmware.vmware.guest_info:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
  register: existing_vm_check
  delegate_to: localhost
  connection: local
  ignore_errors: true
  when: not ansible_check_mode

# Display VM existence and power state for visibility
- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ existing_vm_check.guests | default([]) | length > 0 }}"
      - "Power State: {{ existing_vm_check.guests[0].hw_power_status | default('N/A') if existing_vm_check.guests | default([]) | length > 0 else 'N/A' }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# Clone VM from template
# deploy_folder_template handles placement (datacenter, cluster, datastore, folder)
# Power on is deferred so we can apply customization first
- name: "Clone VM from template"
  vmware.vmware.deploy_folder_template:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    template_name: "{{ config_vm_template }}"
    template_folder: "{{ config_vm_folder }}"
    vm_name: "{{ config_vm_name }}"
    vm_folder: "{{ config_vm_folder }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    cluster: "{{ config_vcenter_cluster }}"
    datastore: "{{ config_vcenter_datastore }}"
    resource_pool: "{{ config_vcenter_resource_pool | default(omit) }}"
    power_on_after_deploy: false
  async: "{{ vm_async_timeout | default(3600) | int }}"
  poll: "{{ vm_poll_interval | default(0) | int }}"
  register: vm_creation
  when:
    - not ansible_check_mode
    - existing_vm_check.guests | default([]) | length == 0
  delegate_to: localhost
  connection: local

# Poll async job until completion or timeout
- name: "Wait for VM creation to complete"
  ansible.builtin.async_status:
    jid: "{{ vm_creation.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  retries: "{{ config_vm_async_retries | int }}"
  delay: "{{ config_vm_async_delay | int }}"
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.ansible_job_id is defined
  delegate_to: localhost
  connection: local

# Configure VM hardware (CPU, memory, network adapter, annotation)
- name: "Configure VM hardware and network adapter"
  vmware.vmware.vm:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    annotation: "Created by Ansible on {{ now(utc=true).strftime('%Y-%m-%d') }}"
    cpu:
      cores: "{{ config_vm_cpu_count | int }}"
    memory:
      size_mb: "{{ config_vm_memory_mb | int }}"
    network_adapters:
      - network: "{{ config_vm_network }}"
        adapter_type: "{{ config_vm_network_device_type | default('vmxnet3') }}"
        connected: true
        connect_at_power_on: "{{ config_vm_network_start_connected | default(true) }}"
    scsi_controllers:
      - controller_type: paravirtual
        bus_number: 0
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished == 1
  delegate_to: localhost
  connection: local

# Apply guest OS customization (hostname, DNS, static IP)
# This is applied while VM is powered off; runs on next power-on
- name: "Apply Linux guest OS customization"
  vmware.vmware.vm_apply_customization:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    unix_prep:
      domain: "{{ config_vm_domain }}"
      hostname: "{{ config_vm_name.split('.')[0] }}"
    nic_specific_settings:
      - ipv4:
          address: "{{ config_vm_network_start_ip }}"
          subnet_mask: "{{ config_vm_network_netmask }}"
          gateways:
            - "{{ config_vm_network_gateway }}"
        dns_servers: "{{ config_vm_network_dns_servers if config_vm_network_dns_servers is not string else [config_vm_network_dns_servers] }}"
    global_dns:
      servers: "{{ config_vm_network_dns_servers if config_vm_network_dns_servers is not string else [config_vm_network_dns_servers] }}"
      resolution_suffixes:
        - "{{ config_vm_domain }}"
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished == 1
    - config_vm_os is defined
    - "'Linux' in config_vm_os or 'RHEL' in config_vm_os"
  delegate_to: localhost
  connection: local

# Show summary of VM creation operation
- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "Status: {{ 'SUCCESS' if (job_result is defined and job_result.finished == 1) else 'FAILED' }}"
      - "Changed: {{ job_result.changed | default(false) }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - job_result is defined

# Retrieve detailed error information from async job result file
- name: "Read async job result file for error details"
  ansible.builtin.slurp:
    src: "{{ job_result.results_file }}"
  register: async_job_details
  delegate_to: localhost
  connection: local
  ignore_errors: true
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished != 1
    - job_result.results_file is defined

# Display detailed error information if job failed
- name: "Display async job error details"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Async Job Error Details"
      - "========================================="
      - "{{ async_job_details.content | b64decode | from_json }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - async_job_details is defined
    - async_job_details.content is defined

# Fail playbook if VM creation timed out or failed
- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: |
      VM creation failed or timed out after {{ config_vm_async_retries * config_vm_async_delay }} seconds.
      
      Possible causes:
      1. vCenter is overloaded or slow
      2. Datastore has insufficient space or poor performance
      3. Template is corrupted or missing
      4. Network connectivity issues to vCenter
      5. VM already exists and reconfiguration is hanging
      6. DRS is interfering with VM creation
      7. Guest customization is hanging (template not properly prepared)
      
      Check vCenter tasks for VM {{ config_vm_name }} to see actual status.
      Check the async job details above for specific error messages.
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished != 1

# Dry-run simulation for check mode
- name: "Power on VM (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would power on {{ config_vm_name }}"
  when: ansible_check_mode

# Power on VM — customization spec will execute during boot
- name: "Power on VM"
  vmware.vmware.vm_powerstate:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    name: "{{ config_vm_name }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    state: powered-on
  when: not ansible_check_mode
  delegate_to: localhost
  connection: local
