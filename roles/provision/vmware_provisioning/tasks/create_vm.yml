---
# Creates VM from template using vmware.vmware.deploy_folder_template (clone)
# and vmware.vmware_rest modules (info, customization, power)

# Dry-run simulation for check mode
- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Query vCenter for VM existence
- name: "Check if VM already exists"
  vmware.vmware_rest.vcenter_vm_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    filter_names:
      - "{{ config_vm_name }}"
  register: existing_vm_check
  delegate_to: localhost
  connection: local
  ignore_errors: true
  when: not ansible_check_mode

# Display VM existence for visibility
- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ existing_vm_check.value | default([]) | length > 0 }}"
      - "Power State: {{ existing_vm_check.value[0].power_state | default('N/A') if existing_vm_check.value | default([]) | length > 0 else 'N/A' }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# Clone VM from template (folder-based, not content library)
# deploy_folder_template is the only module that supports folder templates
# cluster and resource_pool are mutually exclusive — only pass resource_pool if set
- name: "Clone VM from template (with cluster)"
  vmware.vmware.deploy_folder_template:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    template_name: "{{ config_vm_template }}"
    template_folder: "{{ config_vm_folder }}"
    vm_name: "{{ config_vm_name }}"
    vm_folder: "{{ config_vm_folder }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    cluster: "{{ config_vcenter_cluster }}"
    datastore: "{{ config_vcenter_datastore }}"
    power_on_after_deploy: false
  async: "{{ vm_async_timeout | default(3600) | int }}"
  poll: "{{ vm_poll_interval | default(0) | int }}"
  register: vm_creation
  when:
    - not ansible_check_mode
    - existing_vm_check.value | default([]) | length == 0
    - config_vcenter_resource_pool | default('') | length == 0
  delegate_to: localhost
  connection: local

- name: "Clone VM from template (with resource pool)"
  vmware.vmware.deploy_folder_template:
    hostname: "{{ vcenter_host }}"
    username: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    template_name: "{{ config_vm_template }}"
    template_folder: "{{ config_vm_folder }}"
    vm_name: "{{ config_vm_name }}"
    vm_folder: "{{ config_vm_folder }}"
    datacenter: "{{ config_vcenter_datacenter }}"
    resource_pool: "{{ config_vcenter_resource_pool }}"
    datastore: "{{ config_vcenter_datastore }}"
    power_on_after_deploy: false
  async: "{{ vm_async_timeout | default(3600) | int }}"
  poll: "{{ vm_poll_interval | default(0) | int }}"
  register: vm_creation_rp
  when:
    - not ansible_check_mode
    - existing_vm_check.value | default([]) | length == 0
    - config_vcenter_resource_pool | default('') | length > 0
  delegate_to: localhost
  connection: local

# Merge the two possible creation results
- name: "Consolidate VM creation result"
  ansible.builtin.set_fact:
    vm_creation: "{{ vm_creation_rp if (vm_creation_rp is defined and vm_creation_rp is not skipped) else vm_creation }}"
  when:
    - not ansible_check_mode

# Poll async job until completion or timeout
- name: "Wait for VM creation to complete"
  ansible.builtin.async_status:
    jid: "{{ vm_creation.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  retries: "{{ config_vm_async_retries | int }}"
  delay: "{{ config_vm_async_delay | int }}"
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.ansible_job_id is defined
  delegate_to: localhost
  connection: local

# Look up the VM MoID (needed for all vmware_rest operations)
- name: "Look up VM MoID"
  vmware.vmware_rest.vcenter_vm_info:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    filter_names:
      - "{{ config_vm_name }}"
  register: vm_moid_lookup
  delegate_to: localhost
  connection: local
  when:
    - not ansible_check_mode

- name: "Store VM MoID"
  ansible.builtin.set_fact:
    _vm_moid: "{{ vm_moid_lookup.value[0].vm }}"
    _vm_network_prefix: "{{ ('0.0.0.0/' + config_vm_network_netmask) | ansible.utils.ipaddr('prefix') }}"
  when:
    - not ansible_check_mode
    - vm_moid_lookup.value is defined
    - vm_moid_lookup.value | length > 0

# Note: vmware.vmware v2.3.0 has no general-purpose VM reconfigure module.
# Hardware (CPU, memory, disk) is inherited from the template.
# If you need to override hardware post-clone, use vmware.vmware_rest.vcenter_vm_hardware_cpu,
# vcenter_vm_hardware_memory, etc.

# Apply guest OS customization (hostname, DNS, static IP)
# Applied while VM is powered off; executes on next power-on
- name: "Apply Linux guest OS customization"
  vmware.vmware_rest.vcenter_vm_guest_customization:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    vm: "{{ _vm_moid }}"
    configuration_spec:
      linux_config:
        hostname:
          fixed_name: "{{ config_vm_name.split('.')[0] }}"
          type: FIXED
        domain: "{{ config_vm_domain }}"
    global_DNS_settings:
      dns_suffix_list:
        - "{{ config_vm_domain }}"
      dns_servers: "{{ config_vm_network_dns_servers if config_vm_network_dns_servers is not string else config_vm_network_dns_servers.split(',') | map('trim') | list }}"
    interfaces:
      - adapter:
          ipv4:
            type: STATIC
            ip_address: "{{ config_vm_network_start_ip }}"
            prefix: "{{ _vm_network_prefix }}"
            gateways:
              - "{{ config_vm_network_gateway }}"
  when:
    - not ansible_check_mode
    - _vm_moid is defined
    - config_vm_os is defined
    - "'Linux' in config_vm_os or 'RHEL' in config_vm_os"
  delegate_to: localhost
  connection: local

# Show summary of VM creation operation
- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "VM MoID: {{ _vm_moid | default('unknown') }}"
      - "Status: {{ 'SUCCESS' if (job_result is defined and job_result.finished == 1) else 'SKIPPED (VM exists)' if (existing_vm_check.value | default([]) | length > 0) else 'FAILED' }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode

# Retrieve detailed error information from async job result file
- name: "Read async job result file for error details"
  ansible.builtin.slurp:
    src: "{{ job_result.results_file }}"
  register: async_job_details
  delegate_to: localhost
  connection: local
  ignore_errors: true
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished is defined
    - job_result.finished != 1
    - job_result.results_file is defined

# Display detailed error information if job failed
- name: "Display async job error details"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Async Job Error Details"
      - "========================================="
      - "{{ async_job_details.content | b64decode | from_json }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - async_job_details is defined
    - async_job_details.content is defined

# Fail playbook if VM creation timed out or failed
- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: |
      VM creation failed or timed out after {{ config_vm_async_retries * config_vm_async_delay }} seconds.

      Possible causes:
      1. vCenter is overloaded or slow
      2. Datastore has insufficient space or poor performance
      3. Template is corrupted or missing
      4. Network connectivity issues to vCenter
      5. DRS is interfering with VM creation
      6. Guest customization is hanging (template not properly prepared)

      Check vCenter tasks for VM {{ config_vm_name }} to see actual status.
  when:
    - not ansible_check_mode
    - job_result is defined
    - job_result.finished is defined
    - job_result.finished != 1

# Dry-run simulation for check mode
- name: "Power on VM (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would power on {{ config_vm_name }}"
  when: ansible_check_mode

# Power on VM — customization spec will execute during boot
- name: "Power on VM"
  vmware.vmware_rest.vcenter_vm_power:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_user_password }}"
    vcenter_validate_certs: "{{ vcenter_validate_certs }}"
    vm: "{{ _vm_moid }}"
    state: start
  when:
    - not ansible_check_mode
    - _vm_moid is defined
  delegate_to: localhost
  connection: local
