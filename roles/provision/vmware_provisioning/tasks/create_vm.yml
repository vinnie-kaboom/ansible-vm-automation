---
# Creates VM from template using vCenter REST API via ansible.builtin.uri.
# ansible.builtin.uri uses Python urllib (stdlib) - no aiohttp or pyvmomi needed.
# filter.names is not supported on this vCenter; all lookups fetch full lists
# and filter client-side with selectattr.

- name: "Clone VM from template (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would clone {{ config_vm_name }} from template {{ config_vm_template }}"
  when: ansible_check_mode

# Authenticate to vCenter REST API - token reused for all subsequent calls.
- name: "Authenticate to vCenter REST API"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/session"
    method: POST
    user: "{{ vcenter_user }}"
    password: "{{ vcenter_user_password }}"
    force_basic_auth: true
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 201
  register: vcenter_session
  delegate_to: localhost
  when: not ansible_check_mode
  no_log: true

- name: "List all VMs in vCenter"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: all_vms_list
  delegate_to: localhost
  ignore_errors: true
  when: not ansible_check_mode

- name: "Find existing VM by name"
  ansible.builtin.set_fact:
    existing_vm_check: "{{ all_vms_list.json | default([]) | selectattr('name', 'equalto', config_vm_name) | list }}"
  when:
    - not ansible_check_mode
    - all_vms_list is defined

- name: "Display existing VM status"
  ansible.builtin.debug:
    msg:
      - "VM {{ config_vm_name }} existence check:"
      - "Exists: {{ (existing_vm_check | default([]) | length) > 0 }}"
      - "Power State: {{ existing_vm_check[0].power_state | default('N/A') }}"
  when:
    - not ansible_check_mode
    - existing_vm_check is defined

# Templates are NOT returned by /api/vcenter/vm - they require a separate endpoint.
# Try /api/vcenter/vm-template/library-items (content library) first,
# then fall back to /api/vcenter/vm?filter.type=TEMPLATE (legacy .vmtx templates).

# --- Content Library path ---
- name: "List all content libraries"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: content_libraries
  delegate_to: localhost
  when: not ansible_check_mode
  failed_when: false

- name: "Search each content library for the template"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library/item?library_id={{ item }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: library_items_results
  delegate_to: localhost
  loop: "{{ content_libraries.json | default([]) }}"
  when:
    - not ansible_check_mode
    - content_libraries.json | default([]) | length > 0
  failed_when: false

# Each library search returns a list of item IDs - get details to match by name.
- name: "Get details for each library item"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/content/library/item/{{ item }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: library_item_details
  delegate_to: localhost
  loop: "{{ library_items_results.results | default([]) | map(attribute='json') | flatten | list }}"
  when:
    - not ansible_check_mode
    - library_items_results is defined
  failed_when: false

- name: "Find template in content library by name"
  ansible.builtin.set_fact:
    content_library_template_id: >-
      {{ (library_item_details.results | default([])
          | map(attribute='json') | list
          | selectattr('name', 'equalto', config_vm_template) | list)[0].id | default('') }}
  when:
    - not ansible_check_mode
    - library_item_details is defined

# --- Legacy template path (.vmtx) ---
- name: "List legacy VM templates"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?filter.type=TEMPLATE"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: legacy_templates
  delegate_to: localhost
  when: not ansible_check_mode
  failed_when: false

- name: "Find legacy template MOID by name"
  ansible.builtin.set_fact:
    legacy_template_moid: >-
      {{ (legacy_templates.json | default([])
          | selectattr('name', 'equalto', config_vm_template) | list)[0].vm | default('') }}
  when:
    - not ansible_check_mode
    - legacy_templates is defined

# Use content library ID if found, otherwise fall back to legacy MOID.
- name: "Set template source"
  ansible.builtin.set_fact:
    template_moid: "{{ content_library_template_id | default('') or legacy_template_moid | default('') }}"
    use_content_library: "{{ content_library_template_id | default('') != '' }}"
  when: not ansible_check_mode

- name: "Fail if template not found"
  ansible.builtin.fail:
    msg: >
      Template '{{ config_vm_template }}' not found in vCenter.
      Checked content libraries and legacy VM templates.
      Verify the template name matches exactly (case-sensitive) and is accessible to this user.
  when:
    - not ansible_check_mode
    - template_moid | default('') == ''

- name: "List all datastores"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/datastore"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: datastore_list
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Find datastore MOID"
  ansible.builtin.set_fact:
    datastore_moid: "{{ (datastore_list.json | default([]) | selectattr('name', 'equalto', config_vcenter_datastore) | list)[0].datastore | default('') }}"
  when:
    - not ansible_check_mode
    - datastore_list is defined

- name: "List all clusters"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/cluster"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: cluster_list
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - config_vcenter_resource_pool | default('') == ''

- name: "Find cluster MOID"
  ansible.builtin.set_fact:
    cluster_moid: "{{ (cluster_list.json | default([]) | selectattr('name', 'equalto', config_vcenter_cluster) | list)[0].cluster | default('') }}"
  when:
    - not ansible_check_mode
    - cluster_list is defined

- name: "List all VM folders"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/folder?filter.type=VIRTUAL_MACHINE"
    method: GET
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 200
  register: folder_list
  delegate_to: localhost
  when: not ansible_check_mode

- name: "Find folder MOID"
  ansible.builtin.set_fact:
    folder_moid: "{{ (folder_list.json | default([]) | selectattr('name', 'equalto', config_vm_folder) | list)[0].folder | default('') }}"
  when:
    - not ansible_check_mode
    - folder_list is defined

# --- Content library deploy (when template is in a content library) ---
- name: "Deploy VM from content library template (cluster)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm-template/library-items/{{ template_moid }}?action=deploy"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      placement:
        cluster: "{{ cluster_moid }}"
        folder: "{{ folder_moid }}"
      powered_on: false
      disk_storage:
        datastore: "{{ datastore_moid }}"
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - use_content_library | default(false)
    - config_vcenter_resource_pool | default('') == ''
    - existing_vm_check | default([]) | length == 0

- name: "Deploy VM from content library template (resource pool)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm-template/library-items/{{ template_moid }}?action=deploy"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      placement:
        resource_pool: "{{ config_vcenter_resource_pool }}"
        folder: "{{ folder_moid }}"
      powered_on: false
      disk_storage:
        datastore: "{{ datastore_moid }}"
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - use_content_library | default(false)
    - config_vcenter_resource_pool | default('') != ''
    - existing_vm_check | default([]) | length == 0

# --- Legacy clone (when template is a .vmtx legacy template) ---
- name: "Clone VM from legacy template (cluster)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?action=clone"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      source: "{{ template_moid }}"
      placement:
        cluster: "{{ cluster_moid }}"
        datastore: "{{ datastore_moid }}"
        folder: "{{ folder_moid }}"
      power_on: false
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - not use_content_library | default(false)
    - config_vcenter_resource_pool | default('') == ''
    - existing_vm_check | default([]) | length == 0

- name: "Clone VM from legacy template (resource pool)"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm?action=clone"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      name: "{{ config_vm_name }}"
      source: "{{ template_moid }}"
      placement:
        resource_pool: "{{ config_vcenter_resource_pool }}"
        datastore: "{{ datastore_moid }}"
        folder: "{{ folder_moid }}"
      power_on: false
    status_code: 201
  register: vm_creation
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - not use_content_library | default(false)
    - config_vcenter_resource_pool | default('') != ''
    - existing_vm_check | default([]) | length == 0

# Apply Linux OS customization before first power-on.
# vm_creation.json is the new VM's MOID string returned by the clone API.
- name: "Apply Linux guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        linux_config:
          hostname:
            type: FIXED
            fixed_name: "{{ config_vm_name.split('.')[0] }}"
          domain: "{{ config_vm_domain }}"
          time_zone: "America/New_York"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined
    - config_vm_os is defined
    - "'Linux' in config_vm_os or 'RHEL' in config_vm_os"

# Apply Windows sysprep customization before first power-on.
- name: "Apply Windows guest customization"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/guest/customization"
    method: PUT
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    body_format: json
    body:
      configuration_spec:
        windows_config:
          reboot: REBOOT
          sysprep:
            user_data:
              computer_name:
                type: FIXED
                fixed_name: "{{ config_vm_name.split('.')[0] }}"
              full_name: "{{ config_windows_fullname | default('Administrator') }}"
              org_name: "{{ config_windows_orgname | default('Organization') }}"
              product_key: ""
            gui_unattended:
              auto_logon: "{{ config_windows_autologon | default(false) }}"
              auto_logon_count: "{{ config_windows_autologon_count | default(1) }}"
              password: "{{ config_windows_admin_password | default(config_vm_root_password) }}"
              time_zone: "{{ config_windows_timezone | default(35) }}"
      global_DNS_settings:
        dns_suffix_list:
          - "{{ config_vm_domain }}"
        dns_servers: "{{ config_vm_network_dns_servers }}"
      interfaces: []
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined
    - config_vm_os is defined
    - "'Windows' in config_vm_os"

- name: "Power on VM (Check Mode)"
  ansible.builtin.debug:
    msg: "CHECK MODE: Would power on {{ config_vm_name }}"
  when: ansible_check_mode

- name: "Power on VM"
  ansible.builtin.uri:
    url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_creation.json }}/power?action=start"
    method: POST
    headers:
      vmware-api-session-id: "{{ vcenter_session.json }}"
    validate_certs: "{{ vcenter_validate_certs }}"
    status_code: 204
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - vm_creation.json is defined

- name: "Display VM creation result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "VM Creation Status"
      - "========================================="
      - "VM Name: {{ config_vm_name }}"
      - "Template: {{ config_vm_template }}"
      - "VM MOID: {{ vm_creation.json | default('N/A') }}"
      - "Status: {{ 'SUCCESS' if (vm_creation is defined and not vm_creation.failed | default(false)) else 'FAILED' }}"
      - "Datacenter: {{ config_vcenter_datacenter }}"
      - "Cluster: {{ config_vcenter_cluster }}"
      - "Datastore: {{ config_vcenter_datastore }}"
      - "========================================="
  when:
    - not ansible_check_mode
    - vm_creation is defined

- name: "Fail if VM creation did not complete"
  ansible.builtin.fail:
    msg: "VM creation failed for {{ config_vm_name }}. Check vCenter tasks for details."
  when:
    - not ansible_check_mode
    - vm_creation is defined
    - vm_creation.failed | default(false)
