---
# Configure guest OS after provisioning.
# Static IP is already set by VMware guest customization.
# This task disables IPv6 via nmcli (RHEL 9 with NetworkManager).

- name: "Wait for SSH to become available on new VM"
  ansible.builtin.wait_for:
    host: "{{ config_vm_network_start_ip }}"
    port: 22
    state: started
    timeout: "{{ config_vm_wait_for_ssh_timeout | default(120) }}"
    delay: "{{ config_vm_wait_for_ssh_delay | default(10) }}"
  delegate_to: localhost
  when: not ansible_check_mode
  register: ssh_wait_result
  failed_when: false

- name: "Disable IPv6 via nmcli"
  become: true
  become_method: sudo
  become_user: root
  vars:
    ansible_user: "{{ secrets.ANSIBLE_USER | default('tmpadmin') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_become_password: "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  ansible.builtin.shell: |
    /usr/bin/nmcli connection modify \
      "$(/usr/bin/nmcli -t -f NAME,UUID,TYPE,DEVICE connection show | awk -F: '$4=="ens192"{print $1}' | head -1)" \
      ipv6.method disabled
    /usr/bin/nmcli connection up \
      "$(/usr/bin/nmcli -t -f NAME,UUID,TYPE,DEVICE connection show | awk -F: '$4=="ens192"{print $1}' | head -1)"
  when:
    - not ansible_check_mode
    - ssh_wait_result is success
  register: ipv6_result
  changed_when: true

- name: "Display guest configuration result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Guest OS Configuration"
      - "========================================="
      - "VM: {{ config_vm_name }}"
      - "IP: {{ config_vm_network_start_ip }}"
      - "IPv6 disabled: {{ 'YES' if ipv6_result is not skipped else 'SKIPPED' }}"
      - "========================================="
  when: not ansible_check_mode
