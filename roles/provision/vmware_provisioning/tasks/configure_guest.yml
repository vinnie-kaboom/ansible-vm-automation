---
# Configure guest OS after provisioning
# SSH reachability already confirmed by validate_ssh.yml before this runs.

- name: "Test SSH connectivity to guest"
  ansible.builtin.wait_for_connection:
    timeout: 60
    delay: 5
  vars:
    ansible_user: "{{ secrets.ANSIBLE_USER | default('tmpadmin') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_become_password: "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  when: not ansible_check_mode
  register: ssh_connect_result
  failed_when: false

# Static IP is already set by VMware guest customization before boot.
# This task only needs to disable IPv6 via sysctl, which works regardless
# of whether NetworkManager, ifcfg, or any other network tool is present.
- name: "Disable IPv6 via sysctl"
  vars:
    ansible_user: "{{ secrets.ANSIBLE_USER | default('tmpadmin') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
  ansible.builtin.shell: |
    sysctl -w net.ipv6.conf.all.disable_ipv6=1
    sysctl -w net.ipv6.conf.default.disable_ipv6=1
    # Persist across reboots — avoid duplicate entries
    grep -q 'net.ipv6.conf.all.disable_ipv6' /etc/sysctl.conf \
      || echo 'net.ipv6.conf.all.disable_ipv6 = 1' >> /etc/sysctl.conf
    grep -q 'net.ipv6.conf.default.disable_ipv6' /etc/sysctl.conf \
      || echo 'net.ipv6.conf.default.disable_ipv6 = 1' >> /etc/sysctl.conf
  when:
    - not ansible_check_mode
    - ssh_connect_result is defined
    - ssh_connect_result is success
  register: ipv6_disable_result
  changed_when: true

- name: "Display guest configuration result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Guest OS Configuration"
      - "========================================="
      - "VM: {{ config_vm_name }}"
      - "IP: {{ config_vm_network_start_ip }}"
      - "IPv6 disabled: {{ 'YES' if ipv6_disable_result is not skipped else 'SKIPPED' }}"
      - "========================================="
  when: not ansible_check_mode
