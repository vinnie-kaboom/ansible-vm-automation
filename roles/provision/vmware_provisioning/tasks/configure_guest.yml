---
# Configure guest OS after provisioning.
# Static IP is already set by VMware guest customization.
# This task disables IPv6 via nmcli (RHEL 9 with NetworkManager).
# Note: provision_linux_vm.yml uses connection: local for the entire play.
# We add the VM IP to in-memory inventory and delegate to it directly.

- name: "Wait for SSH to become available on new VM"
  ansible.builtin.wait_for:
    host: "{{ config_vm_network_start_ip }}"
    port: 22
    state: started
    timeout: "{{ config_vm_wait_for_ssh_timeout | default(120) }}"
    delay: "{{ config_vm_wait_for_ssh_delay | default(10) }}"
  delegate_to: localhost
  when: not ansible_check_mode
  register: ssh_wait_result
  failed_when: false

- name: "Add VM to in-memory inventory for SSH tasks"
  ansible.builtin.add_host:
    name: "vm_guest_target"
    ansible_host: "{{ config_vm_network_start_ip }}"
    ansible_user: "{{ secrets.ANSIBLE_USER | default('tmpadmin') }}"
    ansible_password: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    ansible_become_password: "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    ansible_connection: ssh
  when: not ansible_check_mode
  changed_when: false

- name: "Disable IPv6 via nmcli"
  ansible.builtin.shell: |
    CONN_NAME=$(nmcli -t -f NAME,UUID,TYPE,DEVICE connection show | awk -F: '$4=="ens192"{print $1}' | head -1)
    CONN_NAME="${CONN_NAME:-ens192}"
    echo "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}" | sudo -S nmcli connection modify "${CONN_NAME}" ipv6.method disabled
    echo "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}" | sudo -S nmcli connection up "${CONN_NAME}"
  delegate_to: vm_guest_target
  when:
    - not ansible_check_mode
    - ssh_wait_result is success
  register: ipv6_result
  changed_when: true

- name: "Display guest configuration result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Guest OS Configuration"
      - "========================================="
      - "VM: {{ config_vm_name }}"
      - "IP: {{ config_vm_network_start_ip }}"
      - "IPv6 disabled: {{ 'YES' if ipv6_result is not skipped else 'SKIPPED' }}"
      - "========================================="
  when: not ansible_check_mode
