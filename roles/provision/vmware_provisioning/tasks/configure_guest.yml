---
# Configure guest OS after provisioning.
# Static IP is already set by VMware guest customization.
# This task disables IPv6 via nmcli (RHEL 9 with NetworkManager).

- name: "Wait for SSH to become available on new VM"
  ansible.builtin.wait_for:
    host: "{{ config_vm_network_start_ip }}"
    port: 22
    state: started
    timeout: "{{ config_vm_wait_for_ssh_timeout | default(120) }}"
    delay: "{{ config_vm_wait_for_ssh_delay | default(10) }}"
  delegate_to: localhost
  when: not ansible_check_mode
  register: ssh_wait_result
  failed_when: false

- name: "Set guest credentials for delegation"
  ansible.builtin.set_fact:
    _guest_user: "{{ secrets.ANSIBLE_USER | default('tmpadmin') }}"
    _guest_pass: "{{ secrets.ANSIBLE_SSH_PASS | default('') }}"
    _guest_become_pass: "{{ secrets.ANSIBLE_BECOME_PASS | default(secrets.ANSIBLE_SSH_PASS | default('')) }}"
  when: not ansible_check_mode
  no_log: true

- name: "Disable IPv6 via nmcli"
  ansible.builtin.shell: >-
    sshpass -p {{ _guest_pass | quote }}
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    {{ _guest_user }}@{{ config_vm_network_start_ip }}
    "CONN=\$(nmcli -t -f NAME,UUID,TYPE,DEVICE connection show | awk -F: '\$4==\"ens192\"{print \$1}' | head -1);
    CONN=\${CONN:-ens192};
    echo {{ _guest_become_pass | quote }} | sudo -S nmcli connection modify \"\$CONN\" ipv6.method disabled &&
    echo {{ _guest_become_pass | quote }} | sudo -S nmcli connection up \"\$CONN\""
  delegate_to: localhost
  when:
    - not ansible_check_mode
    - ssh_wait_result is success
  register: ipv6_result
  changed_when: true

- name: "Display guest configuration result"
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "Guest OS Configuration"
      - "========================================="
      - "VM: {{ config_vm_name }}"
      - "IP: {{ config_vm_network_start_ip }}"
      - "IPv6 disabled: {{ 'YES' if ipv6_result is not skipped else 'SKIPPED' }}"
      - "========================================="
  when: not ansible_check_mode
