---
name: VM Provisioning Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [staging]

jobs:
  validation:
    name: Validate Configuration
    if: ${{ github.event_name == 'pull_request' }}
    uses: operations-support/ansible-golden/.github/workflows/vm-operations.yml@main
    secrets: inherit
    with:
      playbook: 'playbooks/site.yml'
      tags: 'validation'
      limit: 'all_servers'
      check_mode: false

  provision-staging:
    name: Provision VMs (staging)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/staging' }}
    uses: operations-support/ansible-golden/.github/workflows/vm-operations.yml@main
    secrets: inherit
    with:
      playbook: 'playbooks/site.yml'
      tags: 'validation,vm-operations,status'
      limit: 'all_servers'
      check_mode: false

  domain-join-staging:
    name: Join Domain (staging)
    needs: provision-staging
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/staging' && needs.provision-staging.result == 'success' }}
    uses: operations-support/ansible-golden/.github/workflows/join_operations.yml@main
    secrets: inherit
    with:
      playbook: 'playbooks/site.yml'
      tags: 'domain_join'

