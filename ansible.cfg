[defaults]
inventory = inventory/hosts.ini
host_key_checking = False
gather_facts = True
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400
retry_files_enabled = False
roles_path = roles
collections_on_ansible_version_mismatch = ignore
# Use the Python that launched ansible-playbook (the EE Python with VMware libraries).
# auto_legacy_silent prefers sys.executable over discovery, ensuring local connection
# tasks use the same Python as the controller process.
interpreter_python = auto_legacy_silent
# Fix temp directory permissions issue in container
local_tmp = /tmp

display_skipped_hosts = True
display_ok_hosts = True

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
