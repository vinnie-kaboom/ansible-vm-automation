---
# ===================================================================================
# PLAYBOOK: Error Handling and Cleanup
# ===================================================================================
# Uses ansible.builtin.uri (Python urllib stdlib) - no aiohttp or pyvmomi needed.
# ===================================================================================

- name: "Error Handling and Cleanup"
  hosts: "{{ ansible_host | default('all') }}:!runner"
  any_errors_fatal: true
  gather_facts: false
  connection: local

  tasks:
    - name: "Check if cleanup is needed"
      block:
        - name: "Authenticate to vCenter REST API"
          ansible.builtin.uri:
            url: "https://{{ vcenter_host }}/api/session"
            method: POST
            user: "{{ vcenter_user }}"
            password: "{{ vcenter_user_password }}"
            force_basic_auth: true
            validate_certs: "{{ vcenter_validate_certs }}"
            status_code: 201
          register: cleanup_session
          delegate_to: localhost
          no_log: true

        - name: "List all VMs to find target"
          ansible.builtin.uri:
            url: "https://{{ vcenter_host }}/api/vcenter/vm"
            method: GET
            headers:
              vmware-api-session-id: "{{ cleanup_session.json }}"
            validate_certs: "{{ vcenter_validate_certs }}"
            status_code: 200
          register: all_vms_cleanup
          delegate_to: localhost
          ignore_errors: true

        - name: "Find VM by name"
          ansible.builtin.set_fact:
            vm_info: "{{ all_vms_cleanup.json | default([]) | selectattr('name', 'equalto', config_vm_name) | list }}"

        - name: "Power off VM if running"
          ansible.builtin.uri:
            url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_info[0].vm }}/power?action=stop"
            method: POST
            headers:
              vmware-api-session-id: "{{ cleanup_session.json }}"
            validate_certs: "{{ vcenter_validate_certs }}"
            status_code: 204
          delegate_to: localhost
          ignore_errors: true
          when:
            - vm_info | default([]) | length > 0
            - vm_info[0].power_state == "POWERED_ON"

        - name: "Remove VM"
          ansible.builtin.uri:
            url: "https://{{ vcenter_host }}/api/vcenter/vm/{{ vm_info[0].vm }}"
            method: DELETE
            headers:
              vmware-api-session-id: "{{ cleanup_session.json }}"
            validate_certs: "{{ vcenter_validate_certs }}"
            status_code: 204
          delegate_to: localhost
          ignore_errors: true
          when:
            - vm_info | default([]) | length > 0

      when: cleanup_on_failure | bool
