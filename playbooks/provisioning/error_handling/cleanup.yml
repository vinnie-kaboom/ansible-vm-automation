---
# ===================================================================================
# PLAYBOOK: Error Handling and Cleanup
# ===================================================================================
# Checks VM state in vCenter, powers off if needed, and removes it.
# Uses vmware.vmware_rest modules exclusively.
# ===================================================================================

- name: "Error Handling and Cleanup"
  hosts: "{{ ansible_host | default('all') }}:!runner"
  any_errors_fatal: true
  gather_facts: false
  connection: local

  tasks:
    - name: "Check if cleanup is needed"
      block:
        - name: "Look up VM in vCenter"
          vmware.vmware_rest.vcenter_vm_info:
            vcenter_hostname: "{{ vcenter_host }}"
            vcenter_username: "{{ vcenter_user }}"
            vcenter_password: "{{ vcenter_user_password }}"
            vcenter_validate_certs: "{{ vcenter_validate_certs }}"
            filter_names:
              - "{{ config_vm_name }}"
          register: vm_lookup
          ignore_errors: true

        - name: "Power off VM if running"
          vmware.vmware_rest.vcenter_vm_power:
            vcenter_hostname: "{{ vcenter_host }}"
            vcenter_username: "{{ vcenter_user }}"
            vcenter_password: "{{ vcenter_user_password }}"
            vcenter_validate_certs: "{{ vcenter_validate_certs }}"
            vm: "{{ vm_lookup.value[0].vm }}"
            state: stop
          when:
            - vm_lookup is succeeded
            - vm_lookup.value | default([]) | length > 0
            - vm_lookup.value[0].power_state | default('') == 'POWERED_ON'
          ignore_errors: true

        - name: "Remove VM"
          vmware.vmware_rest.vcenter_vm:
            vcenter_hostname: "{{ vcenter_host }}"
            vcenter_username: "{{ vcenter_user }}"
            vcenter_password: "{{ vcenter_user_password }}"
            vcenter_validate_certs: "{{ vcenter_validate_certs }}"
            vm: "{{ vm_lookup.value[0].vm }}"
            state: absent
          when:
            - vm_lookup is succeeded
            - vm_lookup.value | default([]) | length > 0
          ignore_errors: true

      when: cleanup_on_failure | bool
