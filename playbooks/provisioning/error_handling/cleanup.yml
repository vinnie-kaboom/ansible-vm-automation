---
# ===================================================================================
# PLAYBOOK: Error Handling and Cleanup
# ===================================================================================
# Checks VM state in vCenter, powers off if needed, and removes it.
# ===================================================================================

- name: "Error Handling and Cleanup"
  hosts: "{{ ansible_host | default('all') }}:!runner"
  any_errors_fatal: true
  gather_facts: false
  connection: local

  tasks:
    - name: "Check if cleanup is needed"
      block:
        - name: "Get VM info"
          vmware.vmware_rest.vcenter_vm_info:
            vcenter_hostname: "{{ vcenter_host }}"
            vcenter_username: "{{ vcenter_user }}"
            vcenter_password: "{{ vcenter_user_password }}"
            vcenter_validate_certs: "{{ vcenter_validate_certs }}"
            filter_names:
              - "{{ config_vm_name }}"
          register: vm_power_info
          ignore_errors: true

        - name: "Power off VM if running"
          vmware.vmware.vm_powerstate:
            hostname: "{{ vcenter_host }}"
            username: "{{ vcenter_user }}"
            password: "{{ vcenter_user_password }}"
            validate_certs: "{{ vcenter_validate_certs }}"
            name: "{{ config_vm_name }}"
            datacenter: "{{ config_vcenter_datacenter }}"
            state: powered-off
          when:
            - not vm_power_info.failed | default(true)
            - vm_power_info.value | default([]) | length > 0
          ignore_errors: true

        # vcenter_vm requires the VM MOID from vcenter_vm_info value[0].vm
        - name: "Remove VM"
          vmware.vmware_rest.vcenter_vm:
            vcenter_hostname: "{{ vcenter_host }}"
            vcenter_username: "{{ vcenter_user }}"
            vcenter_password: "{{ vcenter_user_password }}"
            vcenter_validate_certs: "{{ vcenter_validate_certs }}"
            vm: "{{ vm_power_info.value[0].vm }}"
            state: absent
          when:
            - not vm_power_info.failed | default(true)
            - vm_power_info.value | default([]) | length > 0
          ignore_errors: true

      when: cleanup_on_failure | bool
