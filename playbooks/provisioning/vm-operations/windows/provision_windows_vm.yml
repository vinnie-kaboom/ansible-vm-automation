---

- name: "Windows VM Provisioning"
  hosts: "{{ ansible_host | default('all') }}:!runner"
  any_errors_fatal: true
  gather_facts: false
  connection: local

  vars:
    config_guest_os_type: windows

  roles:
    - role: provision/vmware_provisioning
      tags: vm-operations
      when: not (dry_run | default(false) | bool)